<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="cubestyle.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comic+Relief:wght@400;700&family=Orbitron:wght@400..900&family=Saira:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Ekstrakt kostkowy</title>
    <meta charset="UTF-8" />
  </head>
  <body>
    <header>
      <div class="blackbg">
        <h3>Heya! Welcome to The Cube Extract :)</h3>
      </div>
      <br />
      <div class="blackbg">
        <p>
          More stuff will be added over time, but in the meantime, enjoy what i
          have done!
        </p>
      </div>
    </header>
    <div class="page-container">
      <div class="side-banner left-banner"></div>
      <div class="center-content">
        <section id="Navigator">
          <div class="navigatorgroup">
            <div class="groupeveryding">
              <h2 class="navigator">Navigator</h2>
              <div class="navigator">
                <nav>
                  <ul>
                    <li><a href="my_socials.html">My Socials</a></li>
                    <li><a href="my_projects.html">Projects</a></li>
                    <li><a href="about.html">About Me</a></li>
                    <li><a href="credits.html">Credits</a></li>
                  </ul>
                </nav>
              </div>
            </div>
            <div id="nav-description">
              <p id="desc-text">
                Hover over a menu option for a description...
              </p>
            </div>
            <div class="img">
              <img src="2026_07_05_11y_Kleki.png" />
            </div>
          </div>
        </section>
      </div>
      <div class="side-banner right-banner"></div>
    </div>
    <audio
      id="bg-music"
      src="ytmp3free.cc_sky-high-youtubemp3free.org.mp3"
      loop
    ></audio>
    <button id="music-toggle" class="custom-placement">
      <img
        id="toggle-icon"
        src="2026_07_04_10o_Kleki.png"
        alt="Cubettum Extractum"
        style="width: 150px; height: 200px"
      />
    </button>
    <script>
      const music = document.getElementById("bg-music");
      const toggleBtn = document.getElementById("music-toggle");
      const toggleIcon = document.getElementById("toggle-icon");

      toggleBtn.addEventListener("click", function () {
        if (music.paused) {
          music.play();
          toggleIcon.src = "2026_07_04_10t_Kleki.png";
          toggleIcon.alt = "Pause Music";
        } else {
          music.pause();
          toggleIcon.src = "2026_07_04_10o_Kleki.png";
          toggleIcon.alt = "Play Music";
        }
      });
    </script>
    <script>
      const links = document.querySelectorAll("div.navigator a");
      const descText = document.getElementById("desc-text");
      links.forEach((link) => {
        link.addEventListener("mouseenter", function () {
          const linkText = this.textContent;
          if (linkText === "My Socials") {
            descText.textContent = "Go check out my socials! (pretty please)";
          } else if (linkText === "Projects") {
            descText.textContent =
              "Check out the stuff that I made or collaborated to its creation";
          } else if (linkText === "About Me") {
            descText.textContent =
              "Get to know me and the stuff i like here! (pretty good page imo you should check it out)";
          } else if (linkText === "Credits") {
            descText.textContent =
              "The credits for everything here that was not made by your awesomeness (but is still awesome)";
          }
          descText.style.color = "rgb(57, 252, 3)";
        });
        link.addEventListener("mouseleave", function () {
          descText.textContent = "Hover over a menu option to explore...";
          descText.style.color = "rgba(211, 255, 199, 0.8)";
        });
      });
    </script>
  </body>
</html>
