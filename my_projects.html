<audio id="bg-music" src="ytmp3free.cc_sky-high-youtubemp3free.org.mp3" loop></audio>
<button id="music-toggle" class="custom-placement">
  <img id="toggle-icon" src="2026_07_04_10i_Kleki.png" alt="Cubettum Extractum" style="width: 150px; height: 200px;">
</button>
   <script>
    const music = document.getElementById('bg-music');
    const toggleBtn = document.getElementById('music-toggle');
    const toggleIcon = document.getElementById('toggle-icon');

    toggleBtn.addEventListener('click', function() {
        if (music.paused) {
            music.play();
            toggleIcon.src = '2026_07_04_10o_Kleki.png';
            toggleIcon.alt = 'Pause Music';
        } else {
            music.pause();
            toggleIcon.src = '2026_07_04_10i_Kleki.png';
            toggleIcon.alt = 'Play Music';
        }
    });
</script>
